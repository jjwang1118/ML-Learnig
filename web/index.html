<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>學習筆記</title>

  <!-- Marked (Markdown) -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- Highlight.js -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <!-- KaTeX (LaTeX) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/contrib/auto-render.min.js"
          onload="window._katexReady=true"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0d1117;
      --sidebar-bg:  #111827;
      --chat-bg:     #111827;
      --border:      #21293a;
      --text:        #e2e8f0;
      --muted:       #64748b;
      --accent:      #60a5fa;       /* blue */
      --green:       #34d399;
      --purple:      #a78bfa;
      --pink:        #f472b6;
      --yellow:      #fbbf24;
      --hover:       #1e293b;
      --active-bg:   #1e3a5f;
      --active-fg:   #93c5fd;
      --sidebar-w:   260px;
      --chat-w:      340px;
    }

    html, body { height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #sidebar-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: .4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #tree { overflow-y: auto; flex: 1; padding: 6px 0; }

    .dir-label {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .7px;
      cursor: pointer;
      user-select: none;
      transition: color .15s;
    }
    .dir-label:hover { color: var(--text); }
    .dir-arrow { transition: transform .15s; font-size: 9px; }
    .dir-arrow.open { transform: rotate(90deg); }

    .file-item {
      display: block;
      padding: 5px 14px 5px 30px;
      font-size: 12.5px;
      color: var(--muted);
      cursor: pointer;
      border-left: 2px solid transparent;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-decoration: none;
      transition: background .1s, color .1s;
    }
    .file-item:hover { background: var(--hover); color: var(--text); }
    .file-item.active {
      color: var(--active-fg);
      border-left-color: var(--accent);
      background: var(--active-bg);
    }

    /* ── Main area ── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    #topbar {
      padding: 0 20px;
      height: 44px;
      border-bottom: 1px solid var(--border);
      font-size: 12.5px;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    #breadcrumb { display: flex; align-items: center; gap: 5px; }
    .crumb { color: var(--text); }
    .sep { color: var(--border); }

    #chat-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      background: var(--hover);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 12px;
      cursor: pointer;
      transition: background .15s, border-color .15s;
    }
    #chat-toggle:hover { background: #1e3a5f; border-color: var(--accent); color: var(--accent); }
    #chat-toggle.active { background: #1e3a5f; border-color: var(--accent); color: var(--accent); }

    #content-wrap { flex: 1; overflow-y: auto; }

    #content {
      padding: 36px 52px;
      max-width: 820px;
      margin: 0 auto;
    }

    /* ── Markdown typography ── */
    #content h1 {
      font-size: 26px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 18px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
    #content h2 {
      font-size: 19px;
      font-weight: 600;
      color: var(--green);
      margin: 32px 0 12px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }
    #content h3 {
      font-size: 15px;
      font-weight: 600;
      color: var(--purple);
      margin: 22px 0 8px;
    }
    #content h4 {
      font-size: 13.5px;
      font-weight: 600;
      color: var(--yellow);
      margin: 16px 0 6px;
    }
    #content p { line-height: 1.75; margin-bottom: 14px; color: #cbd5e1; font-size: 14px; }
    #content a { color: var(--accent); text-decoration: none; }
    #content a:hover { text-decoration: underline; }

    #content strong { color: var(--yellow); font-weight: 600; }
    #content em     { color: var(--pink); }

    #content ul, #content ol { padding-left: 22px; margin-bottom: 14px; }
    #content li { line-height: 1.75; color: #cbd5e1; margin-bottom: 3px; font-size: 14px; }

    #content pre {
      background: #131a26;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 18px 20px;
      overflow-x: auto;
      margin: 18px 0;
      font-size: 13px;
      line-height: 1.6;
      position: relative;
    }

    #content code {
      font-family: "JetBrains Mono", "Fira Code", "Cascadia Code", monospace;
      font-size: 13px;
    }

    #content :not(pre) > code {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 12px;
      color: var(--pink);
    }

    #content blockquote {
      border-left: 3px solid var(--purple);
      padding: 10px 18px;
      margin: 18px 0;
      color: var(--muted);
      background: var(--hover);
      border-radius: 0 6px 6px 0;
      font-size: 13.5px;
    }

    #content table { border-collapse: collapse; width: 100%; margin: 18px 0; font-size: 13px; }
    #content th {
      background: #1e293b;
      padding: 9px 14px;
      text-align: left;
      border: 1px solid var(--border);
      color: var(--accent);
      font-weight: 600;
    }
    #content td { padding: 8px 14px; border: 1px solid var(--border); color: #cbd5e1; }
    #content tr:hover td { background: var(--hover); }

    #content hr { border: none; border-top: 1px solid var(--border); margin: 28px 0; }

    #content img {
      max-width: 100%;
      border-radius: 8px;
      border: 1px solid var(--border);
      margin: 14px 0;
    }

    /* KaTeX display block */
    .katex-display { overflow-x: auto; padding: 8px 0; }

    /* Notebook output */
    .nb-output {
      background: #0a0e17;
      border: 1px dashed var(--border);
      border-top: none;
      border-radius: 0 0 6px 6px;
      margin-top: -14px;
      margin-bottom: 18px;
      padding: 12px 16px;
      font-size: 12px;
      color: #94a3b8;
    }

    /* Welcome */
    #welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 10px;
      color: var(--muted);
    }
    #welcome .icon { font-size: 52px; }
    #welcome h2 { font-size: 20px; color: var(--text); }
    #welcome p { font-size: 13px; }

    /* ── Chat panel ── */
    #chat-panel {
      width: var(--chat-w);
      min-width: var(--chat-w);
      background: var(--chat-bg);
      border-left: 1px solid var(--border);
      display: none;
      flex-direction: column;
      overflow: hidden;
    }
    #chat-panel.open { display: flex; }

    #chat-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg {
      padding: 10px 13px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.6;
      max-width: 100%;
      word-break: break-word;
    }
    .msg.user {
      background: var(--active-bg);
      color: var(--active-fg);
      align-self: flex-end;
      border-radius: 8px 8px 2px 8px;
    }
    .msg.assistant {
      background: var(--hover);
      color: var(--text);
      align-self: flex-start;
      border-radius: 8px 8px 8px 2px;
    }
    .msg.assistant code {
      background: #0d1117;
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 12px;
      color: var(--pink);
      font-family: "JetBrains Mono", monospace;
    }
    .msg.assistant pre {
      background: #0d1117;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      overflow-x: auto;
      margin: 8px 0;
      font-size: 12px;
    }
    .msg.thinking { color: var(--muted); font-style: italic; font-size: 12px; }

    #chat-input-row {
      padding: 12px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
    }

    #chat-input {
      flex: 1;
      background: var(--hover);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 13px;
      padding: 8px 12px;
      resize: none;
      outline: none;
      font-family: inherit;
      height: 70px;
      transition: border-color .15s;
    }
    #chat-input:focus { border-color: var(--accent); }

    #chat-send {
      padding: 0 14px;
      background: var(--accent);
      border: none;
      border-radius: 6px;
      color: #0d1117;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .15s;
      align-self: flex-end;
      height: 36px;
    }
    #chat-send:hover { opacity: .85; }
    #chat-send:disabled { opacity: .4; cursor: not-allowed; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #475569; }
  </style>
</head>
<body>

<!-- Sidebar -->
<nav id="sidebar">
  <div id="sidebar-header">📓 學習筆記</div>
  <div id="tree"></div>
</nav>

<!-- Main -->
<div id="main">
  <div id="topbar">
    <div id="breadcrumb">選擇左側檔案開始閱讀</div>
    <button id="chat-toggle" onclick="toggleChat()">💬 AI 助理</button>
  </div>
  <div id="content-wrap">
    <div id="content">
      <div id="welcome">
        <div class="icon">📚</div>
        <h2>學習筆記</h2>
        <p>從左側選擇一個筆記檔案</p>
      </div>
    </div>
  </div>
</div>

<!-- Chat panel -->
<div id="chat-panel">
  <div id="chat-header">💬 AI 助理 <span style="color:var(--muted);font-weight:400;font-size:11px;margin-left:auto">參考當前筆記回答</span></div>
  <div id="chat-messages">
    <div class="msg assistant">你好！我是你的筆記助理。<br>可以問我任何關於目前筆記或 ML 框架的問題。</div>
  </div>
  <div id="chat-input-row">
    <textarea id="chat-input" placeholder="輸入問題... (Ctrl+Enter 送出)"></textarea>
    <button id="chat-send" onclick="sendChat()">送出</button>
  </div>
</div>

<script>
// ── State ──
let currentFileContent = '';
let chatOpen = false;

// ── Marked setup ──
const renderer = new marked.Renderer();

// Rewrite relative image paths to /image/filename
renderer.image = (token) => {
  const href = (token.href || token).replace(/^(\.\.\/)+image\//, '/image/');
  const text = token.text || '';
  const title = token.title || '';
  return `<img src="${href}" alt="${text}" ${title ? `title="${title}"` : ''} />`;
};

marked.setOptions({ renderer, breaks: true, gfm: true });

// ── KaTeX ──
function renderKaTeX(el) {
  if (!window._katexReady || typeof renderMathInElement === 'undefined') {
    setTimeout(() => renderKaTeX(el), 100);
    return;
  }
  renderMathInElement(el, {
    delimiters: [
      { left: '$$', right: '$$', display: true },
      { left: '$',  right: '$',  display: false },
      { left: '\\[', right: '\\]', display: true },
      { left: '\\(', right: '\\)', display: false },
    ],
    throwOnError: false,
  });
}

// ── Sidebar ──
async function loadTree() {
  const res = await fetch('/api/tree');
  const tree = await res.json();
  const container = document.getElementById('tree');
  container.innerHTML = '';
  renderTree(tree, container);
}

function renderTree(nodes, container) {
  nodes.forEach(node => {
    if (node.type === 'dir') {
      const label = document.createElement('div');
      label.className = 'dir-label';
      label.innerHTML = `<span class="dir-arrow open">▶</span> 📁 ${node.name}`;

      const children = document.createElement('div');
      children.className = 'dir-children';
      renderTree(node.children, children);

      label.addEventListener('click', () => {
        const arrow = label.querySelector('.dir-arrow');
        const open = arrow.classList.toggle('open');
        children.style.display = open ? '' : 'none';
      });

      container.appendChild(label);
      container.appendChild(children);
    } else {
      const icon = node.name.endsWith('.ipynb') ? '📒' : '📄';
      const item = document.createElement('a');
      item.className = 'file-item';
      item.textContent = `${icon} ${node.name}`;
      item.title = node.path;
      item.addEventListener('click', () => openFile(node.path, node.name, item));
      container.appendChild(item);
    }
  });
}

// ── File open ──
let activeEl = null;

async function openFile(path, name, el) {
  if (activeEl) activeEl.classList.remove('active');
  activeEl = el;
  el.classList.add('active');

  const parts = path.split('/');
  const framework = parts.length > 2 ? parts[1] : '';
  document.getElementById('breadcrumb').innerHTML =
    `<span class="crumb">doc</span><span class="sep"> / </span><span class="crumb">${framework}</span><span class="sep"> / </span>${name}`;

  const contentEl = document.getElementById('content');
  contentEl.innerHTML = `<div style="color:var(--muted);padding:20px">載入中…</div>`;

  try {
    const res = await fetch(`/api/content?path=${encodeURIComponent(path)}&t=${Date.now()}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    currentFileContent = text;

    if (name.endsWith('.ipynb')) {
      contentEl.innerHTML = renderNotebook(JSON.parse(text));
    } else {
      contentEl.innerHTML = marked.parse(text);
    }

    if (typeof hljs !== 'undefined') {
      contentEl.querySelectorAll('pre code').forEach(codeEl => hljs.highlightElement(codeEl));
    }
    renderKaTeX(contentEl);
    document.getElementById('content-wrap').scrollTop = 0;
  } catch (err) {
    contentEl.innerHTML = `<div style="color:#f87171;padding:20px">無法載入檔案：${err.message}</div>`;
  }
}

// ── Notebook renderer ──
function renderNotebook(nb) {
  const cells = nb.cells || [];
  return cells.map(cell => {
    const src = Array.isArray(cell.source) ? cell.source.join('') : cell.source;
    if (cell.cell_type === 'markdown') {
      return `<div>${marked.parse(src)}</div>`;
    } else if (cell.cell_type === 'code') {
      const outputs = (cell.outputs || []).map(out => {
        const txt = out.text
          ? out.text.join('')
          : (out.data?.['text/plain'] || []).join('');
        return txt ? `<pre class="nb-output"><code>${escapeHtml(txt)}</code></pre>` : '';
      }).join('');
      return `<pre><code class="language-python">${escapeHtml(src)}</code></pre>${outputs}`;
    }
    return '';
  }).join('\n');
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Chat ──
function toggleChat() {
  chatOpen = !chatOpen;
  document.getElementById('chat-panel').classList.toggle('open', chatOpen);
  document.getElementById('chat-toggle').classList.toggle('active', chatOpen);
}

document.getElementById('chat-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.ctrlKey) { e.preventDefault(); sendChat(); }
});

async function sendChat() {
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if (!msg) return;

  input.value = '';
  const msgs = document.getElementById('chat-messages');

  appendMsg(msg, 'user');
  const thinking = appendMsg('思考中…', 'thinking');
  document.getElementById('chat-send').disabled = true;

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg, context: currentFileContent }),
    });
    const data = await res.json();
    thinking.remove();
    const assistantEl = appendMsg('', 'assistant');
    assistantEl.innerHTML = marked.parse(data.reply);
    assistantEl.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
  } catch (e) {
    thinking.textContent = '發生錯誤，請確認伺服器是否正常運行。';
    thinking.className = 'msg assistant';
  }

  document.getElementById('chat-send').disabled = false;
  msgs.scrollTop = msgs.scrollHeight;
}

function appendMsg(text, cls) {
  const el = document.createElement('div');
  el.className = `msg ${cls}`;
  el.textContent = text;
  const msgs = document.getElementById('chat-messages');
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
  return el;
}

// ── SSE: live file-watch ──
function connectWatch() {
  const es = new EventSource('/api/watch');

  es.addEventListener('tree-changed', () => {
    loadTree();
    // If the currently open file was modified, reload it too
    if (activeEl) {
      const path = activeEl.title;
      const name = path.split('/').pop();
      fetch(`/api/content?path=${encodeURIComponent(path)}&t=${Date.now()}`)
        .then(r => r.text())
        .then(text => {
          currentFileContent = text;
          const contentEl = document.getElementById('content');
          if (name.endsWith('.ipynb')) {
            contentEl.innerHTML = renderNotebook(JSON.parse(text));
          } else {
            contentEl.innerHTML = marked.parse(text);
          }
          contentEl.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
          renderKaTeX(contentEl);
        });
    }
  });

  es.onerror = () => {
    es.close();
    // Reconnect after 3 seconds if connection drops
    setTimeout(connectWatch, 3000);
  };
}

// ── Init ──
loadTree();
connectWatch();
</script>
</body>
</html>
